<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Self Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --danger: #ff6b6b;
    --text: #e8ecf4;
    --muted: #7b88a8;
    --card: #1a1f30;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    margin: 0; display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 16px 60px;
  }
  .wrap { width: 100%; max-width: 420px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px; margin-bottom: 14px;
  }
  .title { font-size: 1.15rem; font-weight: 800; margin-bottom: 4px; }
  .sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  .timer {
    font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.4rem;
    text-align: center; color: var(--accent2); margin: 14px 0;
  }
  .timer.expired { color: var(--danger); }
  .search-box {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text); font-family: 'Sora', sans-serif;
    font-size: 0.95rem; margin-bottom: 10px;
  }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .student-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .student-item {
    padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.02); cursor: pointer; font-size: 0.9rem;
    display: flex; justify-content: space-between; align-items: center;
    transition: all 0.15s;
  }
  .student-item:hover { border-color: var(--accent); background: rgba(79,142,247,0.08); }
  .student-item.selected { border-color: var(--accent2); background: rgba(56,217,169,0.12); }
  .student-item .rn { color: var(--muted); font-size: 0.75rem; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800;
    font-size: 0.95rem; font-family: 'Sora', sans-serif; cursor: pointer; margin-top: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0f1117;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { text-align: center; font-size: 0.85rem; margin-top: 12px; color: var(--muted); }
  .status.ok { color: var(--accent2); }
  .status.err { color: var(--danger); }
  .center-msg { text-align: center; padding: 40px 10px; }
  .center-msg .icon { font-size: 2.4rem; margin-bottom: 10px; }
  .center-msg .msg { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .center-msg .hint { font-size: 0.8rem; color: var(--muted); }
  .spinner {
    width: 26px; height: 26px; border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent2); border-radius: 50%; margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .brand { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 10px; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="mainCard">
    <div class="spinner"></div>
    <div class="center-msg"><div class="msg">Loading session...</div></div>
  </div>
  <div class="brand">📱 TATU · Student Self Attendance</div>
</div>

<script>
const FIREBASE_DB_URL = "https://student-attendance-6d56b-default-rtdb.firebaseio.com";
const FIREBASE_API_KEY = "AIzaSyB0z8G5uIAKBRd6pDf1pOtX3Zkmt6hZjk8";

const params = new URLSearchParams(window.location.search);
const sessionId = params.get('s');
const day = params.get('d');
const reg = params.get('r');

let session = null;
let selectedRn = null;
let timerInterval = null;

// ── Anonymous auth ──
let _fbIdToken = null, _fbTokenExpiry = 0;
async function getFirebaseIdToken() {
  if (_fbIdToken && Date.now() < _fbTokenExpiry) return _fbIdToken;
  var cached = null;
  try { cached = JSON.parse(localStorage.getItem('tatu_fb_auth_student') || 'null'); } catch(e) {}
  var signUrl = 'https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + FIREBASE_API_KEY;
  var refreshUrl = 'https://securetoken.googleapis.com/v1/token?key=' + FIREBASE_API_KEY;
  try {
    if (cached && cached.refreshToken) {
      var r = await fetch(refreshUrl, {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'grant_type=refresh_token&refresh_token=' + cached.refreshToken
      });
      var j = await r.json();
      if (j.id_token) {
        _fbIdToken = j.id_token;
        _fbTokenExpiry = Date.now() + (parseInt(j.expires_in) - 60) * 1000;
        return _fbIdToken;
      }
    }
    var r2 = await fetch(signUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ returnSecureToken: true }) });
    var j2 = await r2.json();
    if (!j2.idToken) return null;
    localStorage.setItem('tatu_fb_auth_student', JSON.stringify({ refreshToken: j2.refreshToken }));
    _fbIdToken = j2.idToken;
    _fbTokenExpiry = Date.now() + (parseInt(j2.expiresIn) - 60) * 1000;
    return _fbIdToken;
  } catch(e) { return null; }
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderCard(html) {
  document.getElementById('mainCard').innerHTML = html;
}

function renderError(msg, hint) {
  renderCard(`
    <div class="center-msg">
      <div class="icon">⚠️</div>
      <div class="msg">${msg}</div>
      ${hint ? `<div class="hint">${hint}</div>` : ''}
    </div>
  `);
}

async function loadSession() {
  if (!sessionId) {
    renderError('Invalid link', 'Session ID missing hai. Sahi link use karo.');
    return;
  }
  try {
    const tok = await getFirebaseIdToken();
    if (!tok) {
      renderError('Connection failed', 'Internet check karo aur page reload karo.');
      return;
    }
    const res = await fetch(`${FIREBASE_DB_URL}/sessions/${sessionId}.json?auth=${tok}`);
    session = await res.json();
    if (!session) {
      renderError('Session not found', 'Ye link expire ho chuka hai ya galat hai.');
      return;
    }
    if (Date.now() > session.expires) {
      renderError('Session expired', 'Teacher se naya QR/link maango.');
      return;
    }
    // check if already submitted from this device
    const storedKey = 'tatu_submitted_' + sessionId;
    const already = localStorage.getItem(storedKey);
    if (already) {
      showSuccess('Aap already attendance mark kar chuke ho ✅');
      return;
    }
    renderStudentPicker();
    startTimer();
  } catch(e) {
    renderError('Something went wrong', 'Page reload karke dobara try karo.');
  }
}

function renderStudentPicker() {
  const students = Object.entries(session.students || {}).map(([rn, s]) => ({ rn: parseInt(rn), name: s.name }));
  students.sort((a, b) => a.name.localeCompare(b.name));

  renderCard(`
    <div class="title">📱 Self Attendance</div>
    <div class="sub">Apna naam list mein se select karo</div>
    <div class="timer" id="timerEl">⏱ --:--</div>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Apna naam search karo..." oninput="filterStudents()"/>
    <div class="student-list" id="studentList"></div>
    <button class="btn" id="markBtn" disabled onclick="markAttendance()">Select your name first</button>
    <div class="status" id="statusEl"></div>
  `);

  window._students = students;
  window._selectedName = null;
  filterStudents();
}

function filterStudents() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  const list = document.getElementById('studentList');
  const filtered = q ? window._students.filter(s => s.name.toLowerCase().includes(q)) : window._students;
  if (filtered.length === 0) {
    list.innerHTML = `<div class="hint" style="text-align:center;padding:16px;color:var(--muted);">Koi naam nahi mila</div>`;
    return;
  }
  list.innerHTML = filtered.map(s => `
    <div class="student-item ${selectedRn === s.rn ? 'selected' : ''}" onclick="selectStudent(${s.rn}, '${s.name.replace(/'/g, "\\'")}')">
      <span>${s.name}</span>
      <span class="rn">Roll ${s.rn + 1}</span>
    </div>
  `).join('');
}

function selectStudent(rn, name) {
  selectedRn = rn;
  window._selectedName = name;
  filterStudents();
  const btn = document.getElementById('markBtn');
  btn.disabled = false;
  btn.textContent = `Mark attendance for ${name}`;
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const remaining = session.expires - Date.now();
    const timerEl = document.getElementById('timerEl');
    if (!timerEl) { clearInterval(timerInterval); return; }
    if (remaining <= 0) {
      timerEl.textContent = '⏱ Expired!';
      timerEl.classList.add('expired');
      clearInterval(timerInterval);
      const btn = document.getElementById('markBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Session expired'; }
      return;
    }
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;
  }, 1000);
}

async function markAttendance() {
  if (selectedRn === null) return;
  const btn = document.getElementById('markBtn');
  const statusEl = document.getElementById('statusEl');
  btn.disabled = true;
  btn.textContent = 'Marking...';
  statusEl.className = 'status';
  statusEl.textContent = '';

  const geoRequired = session.geo && session.geo.radius;

  function submitWithLocation(loc) {
    doSubmit(loc);
  }

  if (geoRequired) {
    if (!navigator.geolocation) {
      statusEl.className = 'status err';
      statusEl.textContent = '❌ Location support nahi hai is browser mein';
      btn.disabled = false;
      btn.textContent = `Mark attendance for ${window._selectedName}`;
      return;
    }
    navigator.geolocation.getCurrentPosition(function(pos) {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const dist = haversineMeters(lat, lng, session.geo.lat, session.geo.lng);
      if (dist > session.geo.radius) {
        statusEl.className = 'status err';
        statusEl.textContent = `❌ Aap college se ${Math.round(dist)}m door ho. College ke andar aa kar try karo.`;
        btn.disabled = false;
        btn.textContent = `Mark attendance for ${window._selectedName}`;
        return;
      }
      submitWithLocation({ lat, lng });
    }, function() {
      statusEl.className = 'status err';
      statusEl.textContent = '❌ Location allow karo attendance mark karne ke liye';
      btn.disabled = false;
      btn.textContent = `Mark attendance for ${window._selectedName}`;
    }, { enableHighAccuracy: true, timeout: 10000 });
  } else {
    // still try to get location if available, but don't block on it
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        submitWithLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
      }, function() {
        submitWithLocation({ lat: 0, lng: 0, unavailable: true });
      }, { timeout: 5000 });
    } else {
      submitWithLocation({ lat: 0, lng: 0, unavailable: true });
    }
  }
}

async function doSubmit(loc) {
  const statusEl = document.getElementById('statusEl');
  try {
    const tok = await getFirebaseIdToken();
    const payload = {
      name: window._selectedName,
      location: loc,
      ts: Date.now()
    };
    const res = await fetch(`${FIREBASE_DB_URL}/sessions/${sessionId}/responses/${selectedRn}.json?auth=${tok}`, {
      method: 'PUT',
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('write failed');
    localStorage.setItem('tatu_submitted_' + sessionId, '1');
    showSuccess(`✅ Attendance mark ho gayi, ${window._selectedName}!`);
  } catch(e) {
    statusEl.className = 'status err';
    statusEl.textContent = '❌ Kuch gadbad hui, phir try karo';
    const btn = document.getElementById('markBtn');
    btn.disabled = false;
    btn.textContent = `Mark attendance for ${window._selectedName}`;
  }
}

function showSuccess(msg) {
  clearInterval(timerInterval);
  renderCard(`
    <div class="center-msg">
      <div class="icon">✅</div>
      <div class="msg">${msg}</div>
      <div class="hint">Aap ab is page ko band kar sakte ho</div>
    </div>
  `);
}

loadSession();
</script>
</body>
</html>
